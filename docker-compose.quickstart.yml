services:
  squadrail:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SQUADRAIL_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      SQUADRAIL_HOME: "/squadrail"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      SQUADRAIL_DEPLOYMENT_MODE: "authenticated"
      SQUADRAIL_DEPLOYMENT_EXPOSURE: "private"
      SQUADRAIL_ALLOWED_HOSTNAMES: "${SQUADRAIL_ALLOWED_HOSTNAMES:-localhost}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3100/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - "${SQUADRAIL_DATA_DIR:-./data/docker-squadrail}:/squadrail"
