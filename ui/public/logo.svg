<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <!-- Squadrail Logo: Icon + Wordmark -->

  <!-- Icon (simplified rails + squad) -->
  <g id="icon">
    <!-- Rails -->
    <path d="M8 25 h40 M8 32 h40 M8 39 h40 M8 46 h40"
          stroke="#84CC16"
          stroke-width="2.5"
          stroke-linecap="round"/>

    <!-- Squad dots -->
    <circle cx="16" cy="25" r="3" fill="#06B6D4"/>
    <circle cx="24" cy="32" r="3" fill="#06B6D4"/>
    <circle cx="32" cy="39" r="3" fill="#06B6D4"/>
    <circle cx="40" cy="46" r="3" fill="#06B6D4"/>
  </g>

  <!-- Wordmark -->
  <text x="65" y="50"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="36"
        font-weight="700"
        fill="currentColor"
        letter-spacing="-0.5">
    SQUADRAIL
  </text>

  <!-- Accent on "RAIL" part -->
  <text x="65" y="50"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="36"
        font-weight="700"
        fill="transparent"
        letter-spacing="-0.5">
    SQUAD<tspan fill="#84CC16">RAIL</tspan>
  </text>
</svg>
