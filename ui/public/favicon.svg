<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Squadrail favicon: Rails + Squad concept -->
  <rect width="64" height="64" rx="12" fill="#0A0A0A"/>

  <!-- Rails (lime green tracks) -->
  <path d="M12 20 h40 M12 28 h40 M12 36 h40 M12 44 h40"
        stroke="#84CC16"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Squad (cyan dots moving along rails) -->
  <circle cx="18" cy="20" r="3.5" fill="#06B6D4"/>
  <circle cx="30" cy="28" r="3.5" fill="#06B6D4"/>
  <circle cx="42" cy="36" r="3.5" fill="#06B6D4"/>
  <circle cx="50" cy="44" r="3.5" fill="#06B6D4"/>

  <!-- Motion trail -->
  <circle cx="14" cy="20" r="1.5" fill="#06B6D4" opacity="0.4"/>
  <circle cx="26" cy="28" r="1.5" fill="#06B6D4" opacity="0.4"/>
  <circle cx="38" cy="36" r="1.5" fill="#06B6D4" opacity="0.4"/>
  <circle cx="46" cy="44" r="1.5" fill="#06B6D4" opacity="0.4"/>
</svg>
