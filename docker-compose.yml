services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: squadrail
      POSTGRES_PASSWORD: squadrail
      POSTGRES_DB: squadrail
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squadrail -d squadrail"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://squadrail:squadrail@db:5432/squadrail
      PORT: "3100"
      SERVE_UI: "true"
      SQUADRAIL_DEPLOYMENT_MODE: "authenticated"
      SQUADRAIL_DEPLOYMENT_EXPOSURE: "private"
      SQUADRAIL_ALLOWED_HOSTNAMES: "${SQUADRAIL_ALLOWED_HOSTNAMES:-localhost}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - squadrail-data:/squadrail
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  squadrail-data:
